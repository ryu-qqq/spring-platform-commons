name: 🐛 버그 제보
description: 모듈 동작 이상·오류를 제보합니다
labels: ["bug"]
body:
  - type: input
    id: module
    attributes:
      label: 모듈
      description: 어떤 모듈에서 발생했나요?
      placeholder: platform-web
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 버전
      placeholder: v0.2.0
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: 무엇이 잘못됐나요
      description: 기대한 동작과 실제 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      description: 의존성 좌표·설정·코드 조각 등 재현에 필요한 정보.
      render: shell
  - type: textarea
    id: env
    attributes:
      label: 환경
      description: Spring Boot / Java / Gradle 버전 등.
